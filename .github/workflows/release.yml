name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to (re)release, e.g. v0.5.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref_name }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build cross-platform binaries
        run: |
          mkdir -p dist
          bun build --compile --target=bun-linux-x64    --outfile=dist/skald-linux-x64        src/index.ts
          bun build --compile --target=bun-linux-arm64  --outfile=dist/skald-linux-arm64      src/index.ts
          bun build --compile --target=bun-darwin-x64   --outfile=dist/skald-darwin-x64       src/index.ts
          bun build --compile --target=bun-darwin-arm64 --outfile=dist/skald-darwin-arm64     src/index.ts
          bun build --compile --target=bun-windows-x64  --outfile=dist/skald-windows-x64.exe  src/index.ts

      - name: Generate checksums
        working-directory: dist
        run: sha256sum skald-* > SHA256SUMS

      - name: Create or update GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG exists, uploading assets"
            gh release upload "$TAG" dist/* --clobber
          else
            echo "Creating release $TAG"
            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes \
              dist/*
          fi
