name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build cross-platform binaries
        run: |
          mkdir -p dist
          bun build --compile --target=bun-linux-x64    --outfile=dist/skald-linux-x64        src/index.ts
          bun build --compile --target=bun-linux-arm64  --outfile=dist/skald-linux-arm64      src/index.ts
          bun build --compile --target=bun-darwin-x64   --outfile=dist/skald-darwin-x64       src/index.ts
          bun build --compile --target=bun-darwin-arm64 --outfile=dist/skald-darwin-arm64     src/index.ts
          bun build --compile --target=bun-windows-x64  --outfile=dist/skald-windows-x64.exe  src/index.ts

      - name: Generate checksums
        working-directory: dist
        run: sha256sum skald-* > SHA256SUMS

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            dist/*
