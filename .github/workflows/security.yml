name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly Monday 06:00 UTC, catches new advisories on stale code
    - cron: "0 6 * * 1"

permissions:
  contents: read
  security-events: write
  pull-requests: read

jobs:
  semgrep:
    name: Semgrep (OWASP Top 10 + JS/TS)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v6

      - name: Run Semgrep
        # SEMGREP_APP_TOKEN, if set as a repo secret, also publishes findings
        # to semgrep.dev. Without it, results are printed locally and the job
        # fails on any blocking finding.
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        run: |
          semgrep ci \
            --config p/owasp-top-ten \
            --config p/javascript \
            --config p/typescript \
            --config p/security-audit \
            --config p/secrets \
            --sarif --output=semgrep.sarif || true

      - name: Upload SARIF to GitHub code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  gitleaks:
    name: Gitleaks (secret scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-review:
    name: Dependency review (PR only)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
